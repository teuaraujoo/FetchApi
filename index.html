<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles/style.css">
    <title>CEP</title>
</head>

<body>
    <div class="container">
        <h1>BUSCA DE CEP</h1>
        <form action="./" method="get">
            <label for="input-cep" class="label">Digite seu CEP:</label>
            <input type="text" name="input-cep" id="input-cep">
            <button id="btn-cep" type="submit" class="button">Buscar</button>
        </form>
        
        <div class="resultado">
            <p>Rua: <span id="rua"></span></p>
            <p>Estado: <span id="estado"></span></p>
            <p>Região: <span id="regiao"></span></p>
            <p>DDD: <span id="ddd"></span></p>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./assets/script/main.js"></script>
</body>

</html>
